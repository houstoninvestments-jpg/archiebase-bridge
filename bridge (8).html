<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIEBASE — THE BRIDGE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #1c1f26;
  --surface:   #22252e;
  --card:      #2e3240;
  --card-h:    #343848;
  --border:    rgba(255,255,255,0.07);
  --border-b:  rgba(255,255,255,0.13);
  --text:      #eaecf0;
  --text-2:    #9ba3b0;
  --text-3:    #596070;
  --cyan:      #4db8d4;
  --gold:      #d4a843;
  --teal:      #3dd4a0;
  --red:       #d45055;
  --r:         8px;
  --r-sm:      5px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

/* ── READER BOARD (top) ── */
.reader-board {
  flex-shrink: 0; height: 34px;
  background: #181b22;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  overflow: hidden; z-index: 20;
}
.rb-label {
  flex-shrink: 0; height: 100%;
  display: flex; align-items: center; gap: 7px;
  padding: 0 14px;
  border-right: 1px solid var(--border);
}
.rb-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 6px rgba(212,168,67,0.6);
  animation: blink 2.5s infinite;
}
.rb-txt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase;
}
.rb-track { flex: 1; overflow: hidden; }
.rb-inner {
  display: flex; white-space: nowrap;
  animation: scrollTicker 80s linear infinite;
}
.rb-inner:hover { animation-play-state: paused; }
@keyframes scrollTicker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.rb-item {
  display: inline-flex; align-items: center;
  padding: 0 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.8px; color: var(--text-3);
}
.rb-item b { font-weight: 500; margin-right: 6px; }
.rb-sep { color: var(--text-3); opacity: 0.2; font-size: 10px; }

/* ── HEADER ── */
.hdr {
  position: relative; z-index: 10; flex-shrink: 0;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; gap: 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.hdr::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan) 30%, var(--teal) 70%, transparent);
  opacity: 0.18;
}
.hdr-l { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 12px; font-weight: 900; letter-spacing: 5px;
  color: var(--text); text-transform: uppercase; white-space: nowrap;
}
.logo span { color: var(--cyan); }
.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-3); border: 1px solid var(--border);
  padding: 3px 8px; border-radius: 3px;
}
.live-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  border: 1px solid rgba(61,212,160,0.2);
  background: rgba(61,212,160,0.05); flex-shrink: 0;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--teal); box-shadow: 0 0 5px var(--teal);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.45} }
.live-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5px; letter-spacing: 2px; color: var(--teal); text-transform: uppercase;
}
.hdr-r { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.stats { display: flex; gap: 14px; }
.hstat { text-align: center; }
.hstat-v { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text); display: block; line-height: 1; }
.hstat-l { font-size: 7.5px; letter-spacing: 1.5px; color: var(--text-3); text-transform: uppercase; margin-top: 2px; }
.hdr-div { width: 1px; height: 20px; background: var(--border-b); }
.clock { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); letter-spacing: 1px; white-space: nowrap; }

/* ── FILTER STRIP ── */
.fstrip {
  flex-shrink: 0; z-index: 9; height: 44px;
  display: flex; align-items: center; gap: 4px;
  padding: 0 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.fstrip::-webkit-scrollbar { display: none; }
.ftag {
  display: flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px;
  border-radius: 20px; border: 1px solid transparent;
  cursor: pointer; user-select: none; flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}
.ftag:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
.ftag.active { background: rgba(255,255,255,0.06); border-color: var(--border-b); }
.ftag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.ftag-n { font-size: 11px; color: var(--text-2); }
.ftag-c { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-3); }

/* ── SCROLL AREA ── */
.scroll {
  flex: 1; min-height: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 16px 12px 52px;
}
.scroll::-webkit-scrollbar { width: 3px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
.scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── DEPT SECTION ── */
.dept-section { margin-bottom: 22px; }
.dept-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.dept-label {
  display: flex; align-items: center; gap: 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-3);
  white-space: nowrap;
}
.dept-label-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dept-label-count { font-size: 8px; letter-spacing: 1px; color: var(--text-3); opacity: 0.6; }
.dept-rule { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(var(--rule-rgb,255,255,255),0.12), transparent); }

/* ── AGENT GRID ── */
.agent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}
.agent-grid.cmd { grid-template-columns: repeat(2, 1fr); }
.agent-grid.cmd .agent-card:first-child { grid-column: 1 / -1; } /* ARCHIE full width */

/* ── AGENT CARD ── */
.agent-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 16px 14px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(255,255,255,0.05);
  transition: background 0.3s, border-color 0.3s, transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease, box-shadow 0.3s;
  overflow: hidden;
  display: flex; flex-direction: column; gap: 10px;
  position: relative;
  opacity: 0;
  transform: translateY(16px);
}
.agent-card.booted {
  opacity: 1;
  transform: translateY(0);
}
.agent-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--ac, transparent), transparent 70%);
  opacity: 0.5; transition: opacity 0.15s;
}
.agent-card:hover { background: var(--card-h); border-color: rgba(139,92,246,0.5); transform: translateY(-4px) scale(1.005); box-shadow: 0 12px 28px rgba(0,0,0,0.45), 0 0 18px rgba(139,92,246,0.08); }
.agent-card:hover::before { opacity: 0.9; }
.agent-card:active { transform: translateY(0); }
.agent-card.dimmed { opacity: 0.06; pointer-events: none; }
.agent-card.lit { border-color: rgba(255,255,255,0.12); }

/* ── CARD TOP ROW ── */
.card-top { display: flex; align-items: center; gap: 10px; pointer-events: none; min-width: 0; }
.orb-wrap { position: relative; flex-shrink: 0; }
.orb-canvas { border-radius: 50%; display: block; }
.orb-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid transparent; pointer-events: none;
  animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.card-meta { flex: 1; min-width: 0; overflow: visible; }
.card-name {
  font-family: 'Orbitron', monospace;
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  line-height: 1.2; margin-bottom: 2px;
  white-space: nowrap;
}
.card-role { font-size: 11px; color: var(--text-2); white-space: nowrap; }
.card-status {
  flex-shrink: 0; display: flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.s-active .status-dot { background: var(--teal); box-shadow: 0 0 5px var(--teal); animation: blink 2s infinite; }
.s-online .status-dot { background: var(--cyan); }
.s-idle   .status-dot { background: var(--gold); }
.s-standby .status-dot { background: var(--text-3); }

/* ── CARD TAGLINE (short punchy description) ── */
.card-tagline {
  font-size: 11px; color: var(--text-2); line-height: 1.5;
  font-style: italic; letter-spacing: 0.1px; pointer-events: none;
}

/* ── CARD FOOTER — last action ── */
.card-footer {
  border-top: 1px solid var(--border); padding-top: 10px;
  font-size: 10.5px; color: var(--text-3); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  pointer-events: none;
}

/* ── MODAL ── */
.mbd {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.mbd.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border-b); border-radius: 10px;
  width: 500px; max-width: 95vw; max-height: 82vh;
  display: flex; flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  overflow: hidden;
  animation: modalIn 0.18s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes modalIn { from{opacity:0;transform:scale(0.92) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
.m-strip { height: 2px; }
.m-hdr { padding: 18px 20px 14px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); }
.m-orb-w { position: relative; flex-shrink: 0; }
.m-orb { border-radius: 50%; display: block; }
.m-ring { position: absolute; inset: -4px; border-radius: 50%; border: 1px solid transparent; animation: spin 6s linear infinite; }
.m-info { flex: 1; }
.m-name { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; letter-spacing: 3px; margin-bottom: 4px; }
.m-role { font-size: 11px; color: var(--text-2); margin-bottom: 2px; }
.m-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 7.5px; letter-spacing: 2px; text-transform: uppercase;
  padding: 4px 10px; border: 1px solid; border-radius: 4px;
}
.m-close {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-3); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.m-close:hover { border-color: var(--border-b); color: var(--text); }

/* Agent bio box in modal */
.m-bio {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text-2); line-height: 1.7;
  background: rgba(0,0,0,0.12);
}

.m-tabs { display: flex; border-bottom: 1px solid var(--border); }
.m-tab {
  flex: 1; padding: 10px 0; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-3); cursor: pointer; border: none; background: transparent;
  border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
}
.m-tab:hover { color: var(--text-2); }
.m-tab.on { color: var(--mc, var(--cyan)); border-bottom-color: var(--mc, var(--cyan)); }
.m-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.m-body::-webkit-scrollbar { width: 2px; }
.m-body::-webkit-scrollbar-thumb { background: var(--border-b); }
.m-pane { display: none; }
.m-pane.on { display: block; }

/* modal content */
.stat-trio {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border); border: 1px solid var(--border);
  border-radius: var(--r-sm); overflow: hidden; margin-bottom: 20px;
}
.stat-cell { background: var(--card); padding: 12px 14px; text-align: center; }
.stat-n { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; display: block; margin-bottom: 4px; }
.stat-l { font-family: 'JetBrains Mono', monospace; font-size: 7px; letter-spacing: 2px; color: var(--text-3); text-transform: uppercase; }
.m-section { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; margin-top: 16px; }
.m-section:first-child { margin-top: 0; }
.la-box { border-left: 2px solid var(--mc, var(--cyan)); background: rgba(255,255,255,0.025); padding: 10px 13px; border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 11px; color: var(--text-2); line-height: 1.6; }
.ok-box { background: rgba(61,212,160,0.05); border-left: 2px solid var(--teal); padding: 9px 12px; border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 10px; color: var(--teal); line-height: 1.5; }
.warn-box { background: rgba(212,80,85,0.05); border-left: 2px solid var(--red); padding: 9px 12px; border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 10px; color: #e88; line-height: 1.5; margin-bottom: 6px; }
.task-list { display: flex; flex-direction: column; gap: 5px; }
.task-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; background: var(--card); border-radius: var(--r-sm); border: 1px solid var(--border); }
.task-icon { font-size: 10px; flex-shrink: 0; margin-top: 1px; }
.task-body { flex: 1; }
.task-title { font-size: 10.5px; color: var(--text); display: block; margin-bottom: 2px; }
.task-meta { font-family: 'JetBrains Mono', monospace; font-size: 7px; color: var(--text-3); letter-spacing: 1px; }
.task-time { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; color: var(--text-3); flex-shrink: 0; }
.log-list { display: flex; flex-direction: column; gap: 3px; }
.log-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; background: var(--card); border-radius: var(--r-sm); }
.log-t { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; color: var(--text-3); width: 50px; flex-shrink: 0; margin-top: 1px; }
.log-tag { font-family: 'JetBrains Mono', monospace; font-size: 6.5px; letter-spacing: 0.5px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
.log-tag.ok   { background: rgba(61,212,160,0.1); color: var(--teal); }
.log-tag.warn { background: rgba(212,168,67,0.1); color: var(--gold); }
.log-tag.error{ background: rgba(212,80,85,0.1);  color: var(--red); }
.log-tag.info { background: rgba(77,184,212,0.1); color: var(--cyan); }
.log-txt { font-size: 10.5px; color: var(--text-2); line-height: 1.5; }

/* --- PREMIUM TACTICAL OVERRIDES --- */
:root {
  --bg: #07090f;
  --surface: #10131a;
  --card: #161a24;
  --card-h: #16171d;
  --border: rgba(139, 92, 246, 0.15);
  --border-b: rgba(139, 92, 246, 0.3);
  --primary: #8b5cf6;
  --accent-teal: #2dd4bf;
}

body {
  background-image:
    radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 70%),
    linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.18) 50%);
  background-size: 100% 100%, 100% 4px;
}

.agent-card {
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
  border-color: rgba(139,92,246,0.15);
}
.agent-card:hover {
  border-color: rgba(139,92,246,0.5);
  box-shadow: 0 0 22px rgba(139,92,246,0.12);
  transform: translateY(-2px) scale(1.01);
}

/* micro-data moved to JS span */

/* Scanning line on hover */
/* scan handled by JS */
.card-scan-line {
  position: absolute;
  left: 0; width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(45,212,191,0.5) 30%, rgba(45,212,191,0.7) 50%, rgba(45,212,191,0.5) 70%, transparent);
  z-index: 5; pointer-events: none;
  opacity: 0;
  top: 0;
}

/* Modal premium */
.modal {
  background: rgba(10,10,14,0.97);
  backdrop-filter: blur(24px) saturate(180%);
  border-color: rgba(139,92,246,0.3);
  box-shadow: 0 0 80px rgba(0,0,0,0.9), 0 0 40px rgba(139,92,246,0.08);
}
.m-tab.on {
  color: #2dd4bf;
  border-bottom-color: #2dd4bf;
  text-shadow: 0 0 8px rgba(45,212,191,0.4);
}

/* Reader board + header on dark bg */
.reader-board { background: #030304; }
.hdr { background: #0c0d10; }


/* ── CINEMATIC ATMOSPHERE ── */
.atmosphere-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 101;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.06; animation: atmPulse 8s ease-in-out infinite;
}
@keyframes atmPulse { 0%,100%{opacity:0.04} 50%{opacity:0.1} }

.vignette {
  position: fixed; inset: 0; z-index: 102; pointer-events: none;
  background: radial-gradient(circle, transparent 25%, rgba(0,0,0,0.75) 100%);
}

/* ── TACTICAL CONTROLS ── */
.ctrl-hub {
  display: flex; gap: 6px;
}
.ctrl-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-3); font-family: 'JetBrains Mono'; font-size: 7px;
  padding: 4px 8px; cursor: pointer; letter-spacing: 0.5px;
  transition: all 0.2s; white-space: nowrap;
}
.ctrl-btn:hover { border-color: var(--border-b); color: var(--text-2); }
.ctrl-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(139,92,246,0.1); }

/* ── FLOATING PARTICLES ── */
.particle {
  position: fixed; border-radius: 50%;
  background: var(--accent); pointer-events: none; z-index: 5;
}


/* ── CRT OVERLAY ── */
.crt-overlay {
  position: fixed; inset: 0; z-index: 5000; pointer-events: none;
  background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.08) 50%),
              linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
  background-size: 100% 3px, 3px 100%;
  animation: crtFlicker 0.12s infinite;
}
@keyframes crtFlicker { 0%{opacity:0.97} 50%{opacity:1} 100%{opacity:0.98} }
.crt-overlay::before {
  content:" "; display:block; position:absolute; inset:0;
  background: rgba(18,16,16,0.04); opacity:0;
  animation: scanWave 9s linear infinite;
}
@keyframes scanWave { 0%{transform:translateY(-100%);opacity:0.4} 100%{transform:translateY(100%);opacity:0.4} }

/* ── DATA STREAM BACKGROUND ── */
#data-stream {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  font-family: 'JetBrains Mono'; font-size: 9px;
  color: var(--accent); opacity: 0.04;
  overflow: hidden; line-height: 1.3; white-space: nowrap;
}

/* ── DIAGNOSTIC BAR ── */
.diag-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 32px;
  background: rgba(0,0,0,0.92); border-top: 1px solid var(--border);
  z-index: 1000; display: flex; align-items: center; padding: 0 16px;
  font-family: 'JetBrains Mono'; font-size: 8px;
  color: var(--teal); gap: 24px; text-transform: uppercase; flex-shrink: 0;
}
.diag-bar span.val { color: var(--text); }
.diag-bar .ml { margin-left: auto; color: var(--text-3); }

/* ── GLITCH BOOT ANIMATION ── */
@keyframes glitchBoot {
  0%   { opacity:0; transform:scale(0.95) translateY(16px); filter:brightness(2) hue-rotate(30deg); }
  40%  { opacity:0.7; transform:scale(1.01); filter:hue-rotate(0deg); }
  100% { opacity:1; transform:scale(1) translateY(0); filter:brightness(1); }

const ctrlState = { sound: true, haptic: true };
let audioCtx = null;

function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick(freq=200, type='sine', vol=0.04, dur=0.08){
  if(!ctrlState.sound) return;
  try {
    const ctx=getAudio();
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.type=type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+dur);
  } catch(e){}
}

function triggerHaptic(pattern){
  if(ctrlState.haptic && navigator.vibrate) navigator.vibrate(pattern);
}

function toggleCtrl(opt){
  ctrlState[opt]=!ctrlState[opt];
  const btn=document.getElementById(`btn-${opt}`);
  btn.classList.toggle('on', ctrlState[opt]);
  btn.textContent=`${opt.toUpperCase()}: ${ctrlState[opt]?'ON':'OFF'}`;
  playTick(300,'square',0.02);
}

// Mouse parallax atmosphere
document.addEventListener('mousemove',(e)=>{
  const x=(e.clientX/window.innerWidth)*100;
  const y=(e.clientY/window.innerHeight)*100;

},{passive:true});

function initParticles(){

// ─── DATA STREAM ─────────────────────────────────────────
function initStream(){
  const el=document.getElementById('data-stream');

  for(let i=0;i<80;i++) html+=`<div id="dsr-${i}">${Array(14).fill(0).map(()=>Math.random().toString(16).slice(2,8)).join(' ')}</div>`;

  },120);
}

// ─── TYPEWRITER ───────────────────────────────────────────
function typewrite(text, el){
  el.innerHTML='';
  let i=0;
  const cursor=document.createElement('span');
  cursor.className='tw-cursor';
  function tick(){
    if(i<text.length){
      el.textContent=text.substring(0,i+1);
      el.appendChild(cursor);
      if(i%4===0) playTick(1800,'sine',0.002,0.025);
      i++;
      setTimeout(tick, 22+Math.random()*18);
    }
  }
  tick();
}

(function uptimeClock(){
  const start=Date.now();
  const el=document.getElementById('diag-uptime');
  setInterval(()=>{
    if(!el) return;
    let d=Math.floor((Date.now()-start)/1000);
    const h=Math.floor(d/3600).toString().padStart(2,'0');
    const m=Math.floor((d%3600)/60).toString().padStart(2,'0');
    const s=(d%60).toString().padStart(2,'0');
    el.textContent=`${h}:${m}:${s}`;
  },1000);
})();


// ─── REACTOR THRUM (ambient background audio) ────────────
let reactorStarted = false;
function startReactorThrum(){
  if(reactorStarted || !ctrlState.sound) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const filt = ctx.createBiquadFilter();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(52, ctx.currentTime);
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(90, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.018, ctx.currentTime + 3);
    osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    osc.start();
    reactorStarted = true;
  } catch(e){}
}
// Start thrum on first interaction
document.addEventListener('click', ()=>{ startReactorThrum(); }, {once:true, passive:true});

// ─── GLITCH SCRAMBLE — header reader board ────────────────
function glitchScramble(text, el){
  const chars = '01#X$@!/\\?';
  let iter = 0;
  el.classList.add('glitching');
  const iv = setInterval(()=>{
    el.textContent = text.split('').map((l,i)=>{
      if(i < iter) return text[i];
      return chars[Math.floor(Math.random()*chars.length)];
    }).join('');
    if(iter >= text.length){ clearInterval(iv); el.classList.remove('glitching'); }
    iter += 0.6;
  }, 28);
}

// ─── RADAR PING ORB — replaces static drawOrb for active agents ─
function drawOrbWithPing(canvas, color, size, label, status){
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  if(orbAnimations.has(canvas)){
    cancelAnimationFrame(orbAnimations.get(canvas));
    orbAnimations.delete(canvas);
  }
  canvas.width = size; canvas.height = size;
  const cx = size/2, cy = size/2, r = (size/2)-3;
  const c = rgb(color);
  const ac = {r:45,g:212,b:191};
  let frame = 0;
  let lastPing = Date.now() - Math.random()*3000; // stagger pings

  function draw(){
    frame += 0.04;
    ctx.clearRect(0,0,size,size);

    // Radar ping — expands out every ~4s
    const pingAge = (Date.now() - lastPing) / 4000;
    if(pingAge > 1) lastPing = Date.now();
    if(pingAge < 0.7){
      const pingR = r + pingAge * r * 1.4;
      const pingA = 0.5 * (1 - pingAge/0.7);
      ctx.beginPath(); ctx.arc(cx,cy,pingR,0,Math.PI*2);
      ctx.strokeStyle = status==='active'
        ? `rgba(45,212,191,${pingA})`
        : `rgba(${c.r},${c.g},${c.b},${pingA})`;
      ctx.lineWidth = 1; ctx.stroke();
    }

    // Outer segmented ring
    ctx.save();
    ctx.setLineDash([2,5]);
    ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2);
    ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},0.2)`;
    ctx.lineWidth = 1; ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    // Core pulsing glow
    const pulse = 0.12 + Math.sin(frame)*0.06;
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${pulse})`);
    g.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();

    // Rotating sweep arc
    ctx.beginPath();
    ctx.arc(cx,cy,r,frame,frame+1.4);
    ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.6)`;
    ctx.lineWidth=1.2; ctx.stroke();

    // Four bracket arcs
    ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.55)`;
    ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){
      const a=(i*Math.PI)/2+Math.PI/4;
      ctx.beginPath(); ctx.arc(cx,cy,r,a-0.22,a+0.22); ctx.stroke();
    }

    // Orbiting teal dot
    const dpx = cx+Math.cos(frame*0.5-Math.PI/4)*r*0.82;
    const dpy = cy+Math.sin(frame*0.5-Math.PI/4)*r*0.82;
    ctx.fillStyle=`rgb(${ac.r},${ac.g},${ac.b})`;
    ctx.shadowColor=`rgba(${ac.r},${ac.g},${ac.b},0.9)`;
    ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(dpx,dpy,1.6,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Initial
    if(label){
      const fs=Math.round(size*0.36);
      ctx.font=`900 ${fs}px 'Orbitron',monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.fillText(label[0].toUpperCase(),cx,cy+size*0.03);
    }
    orbAnimations.set(canvas, requestAnimationFrame(draw));
  }
  draw();
}

// Animated HUD Orb — live pulsing ring + bracket arcs
const orbAnimations = new Map(); // track active rAF loops

function drawOrb(canvas,color,size,label){
  if(!canvas)return;
  // Cancel any existing animation loop for this canvas
  if(orbAnimations.has(canvas)){
    cancelAnimationFrame(orbAnimations.get(canvas));
    orbAnimations.delete(canvas);
  }
  const ctx=canvas.getContext('2d');
  if(!ctx)return;
  canvas.width=size; canvas.height=size;
  const cx=size/2,cy=size/2,r=(size/2)-3;
  const c=rgb(color);
  const ac={r:45,g:212,b:191};
  let frame=0;

  function draw(){
    frame+=0.04;
    ctx.clearRect(0,0,size,size);

    // Outer segmented dashed ring — static
    ctx.save();
    ctx.setLineDash([2,5]);
    ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.2)`;
    ctx.lineWidth=1; ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    // Core glow — pulsing opacity
    const pulse=0.12+Math.sin(frame)*0.06;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${pulse})`);
    g.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();

    // Rotating sweep arc
    ctx.beginPath();
    ctx.arc(cx,cy,r,frame,frame+1.4);
    ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.65)`;
    ctx.lineWidth=1.2; ctx.stroke();

    // Four bracket arcs — fixed
    ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.6)`;
    ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){
      const a=(i*Math.PI)/2+Math.PI/4;
      ctx.beginPath(); ctx.arc(cx,cy,r,a-0.22,a+0.22); ctx.stroke();
    }

    // Teal data point — orbits slowly
    const dpx=cx+Math.cos(frame*0.5-Math.PI/4)*r*0.82;
    const dpy=cy+Math.sin(frame*0.5-Math.PI/4)*r*0.82;
    ctx.fillStyle=`rgb(${ac.r},${ac.g},${ac.b})`;
    ctx.shadowColor=`rgba(${ac.r},${ac.g},${ac.b},0.9)`;
    ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(dpx,dpy,1.6,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Initial — crisp, centered
    if(label){
      const fs=Math.round(size*0.36);
      ctx.font=`900 ${fs}px 'Orbitron',monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.fillText(label[0].toUpperCase(),cx,cy+size*0.03);
    }
    orbAnimations.set(canvas, requestAnimationFrame(draw));
  }
  draw();
}

function mkCard(crew){
  const c=rgb(crew.color),sc=SC[crew.status];
  const card=document.createElement('div');
  card.className='agent-card'; card.dataset.dept=crew.dept; card.dataset.id=crew.id;
  if(crew.status==='standby') card.classList.add('s-alert');
  card.setAttribute('data-dept', crew.dept.substring(0,3).toUpperCase());
  card.style.setProperty('--ac',crew.color);

  card.addEventListener('mouseenter',()=>{ playTick(800,'sine',0.008); });
  card.addEventListener('click', ()=>{ playTick(200,'triangle',0.08); triggerHaptic([15,20,10]); openModal(crew); });
  // Mobile: only open if tap, not scroll
  let touchStartY=0, touchStartX=0;
  card.addEventListener('touchstart',(e)=>{
    touchStartY=e.touches[0].clientY;
    touchStartX=e.touches[0].clientX;
  },{passive:true});
  card.addEventListener('touchend',(e)=>{
    const dy=Math.abs(e.changedTouches[0].clientY-touchStartY);
    const dx=Math.abs(e.changedTouches[0].clientX-touchStartX);
    if(dy<8&&dx<8){ playTick(200,'triangle',0.08); triggerHaptic([15,20,10]); openModal(crew); }
  },{passive:true});
  const ro=crew.sz+8,rc=`rgba(${c.r},${c.g},${c.b},0.25)`;
  card.innerHTML=`
    <div class="card-scan-line"></div>
    <canvas class="neon-border"></canvas>
    <div class="card-top">
      <div class="orb-wrap">
        <canvas class="orb-canvas" id="orb-${crew.id}" width="${crew.sz}" height="${crew.sz}"

    </div>
    <div class="card-tagline">${TAGLINE[crew.id]||''}</div>

      ?`<div class="m-section" style="color:var(--red);margin-top:16px">Active Issues</div>${tasks.err.map(e=>`<div class="warn-box">${e.t}</div>`).join('')}`

  `;

    <div class="m-section">Completed (${tasks.done.length})</div>
    <div class="task-list">${tasks.done.map(t=>`
      <div class="task-item">
        <span class="task-icon" style="color:var(--teal)">✓</span>

    <div class="m-section" style="margin-top:16px">Upcoming (${tasks.next.length})</div>
    <div class="task-list">${tasks.next.map(t=>`
      <div class="task-item" style="border-color:rgba(${c.r},${c.g},${c.b},0.15)">
        <span class="task-icon" style="color:${crew.color}">→</span>
        <div class="task-body"><span class="task-title">${t.t}</span><span class="task-meta">${t.m}</span></div>
        <span class="task-time">${t.ts}</span>
      </div>`).join('')}</div>
  `;
  document.getElementById('pane-log').innerHTML=`
    <div class="log-list">${log.map(e=>`
      <div class="log-item">
        <span class="log-t">${e.ts}</span>

        <span class="log-txt">${e.t}</span>

}

// ─── AMBIENT SCAN LINES ──────────────────────────────────
function startAmbientScans(){
  const cards = document.querySelectorAll('.agent-card');
  cards.forEach(card=>{
    const line = card.querySelector('.card-scan-line');
    if(!line) return;
    // Each card gets its own random timing loop
    function doScan(){
      // Random delay between scans: 4s - 18s
      const delay = 4000 + Math.random()*14000;
      setTimeout(()=>{
        // Animate the line from top to bottom
        const dur = 900 + Math.random()*600; // 0.9-1.5s per sweep
        let start = null;
        const cardH = card.offsetHeight;
        line.style.opacity = '0';
        line.style.top = '0px';
        function step(ts){
          if(!start) start=ts;
          const p = Math.min((ts-start)/dur, 1);
          const eased = p; // linear is fine for scan
          line.style.top = (eased * cardH) + 'px';
          // Fade in then out
          line.style.opacity = p < 0.1 ? (p/0.1)*0.7
                             : p > 0.85 ? ((1-p)/0.15)*0.7
                             : '0.7';
          if(p < 1) requestAnimationFrame(step);
          else { line.style.opacity='0'; doScan(); }
        }
        requestAnimationFrame(step);
      }, delay);
    }
    // Stagger initial start so they don't all fire together
    setTimeout(doScan, Math.random()*8000);
  });
}


// ─── NEON STREAK BORDERS ─────────────────────────────────
function initNeonBorders(){
  document.querySelectorAll('.agent-card').forEach(card => {
    const cv = card.querySelector('.neon-border');
    if(!cv) return;
    const ctx = cv.getContext('2d');

    // Very slow — one lap every 12-22 seconds
    const speed = 0.0008 + Math.random() * 0.0006;
    let angle = Math.random() * Math.PI * 2;

    // Tail history — last N positions
    const TAIL = 38;
    const history = [];

    function resize(){
      cv.width = card.offsetWidth;
      cv.height = card.offsetHeight;
    }
    resize();
    new ResizeObserver(resize).observe(card);

    function posOnPerimeter(a, w, h){
      // Map angle 0–2π to a position along the card border
      const bev = 10;
      const perim = 2*(w + h) - bev * 2;
      const pos = ((a % (Math.PI*2)) / (Math.PI*2)) * perim;
      let x, y;
      if(pos < w - bev){
        x = pos; y = 0;
      } else if(pos < w - bev + h){
        x = w; y = pos - (w - bev);
      } else if(pos < w - bev + h + w - bev){
        x = w - bev - (pos - (w - bev + h)); y = h;
      } else {
        x = 0; y = h - (pos - (w - bev + h + w - bev));
      }
      return {x, y};
    }

    function draw(){
      const w = cv.width, h = cv.height;
      ctx.clearRect(0, 0, w, h);

      const head = posOnPerimeter(angle, w, h);
      history.unshift({x: head.x, y: head.y});
      if(history.length > TAIL) history.pop();

      // Draw tail — dim line segments fading to nothing
      for(let i = 1; i < history.length; i++){
        const t = 1 - i / history.length; // 1 at head → 0 at tail
        const alpha = t * t * 0.35; // quadratic fade, max 0.35 — very dim
        ctx.beginPath();
        ctx.moveTo(history[i-1].x, history[i-1].y);
        ctx.lineTo(history[i].x, history[i].y);
        ctx.strokeStyle = `rgba(139, 92, 246, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Head — tiny bright dot, no glow bloom
      if(history.length > 0){
        ctx.beginPath();
        ctx.arc(head.x, head.y, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(200, 180, 255, 0.75)';
        ctx.fill();
      }

      angle += speed;
      requestAnimationFrame(draw);
    }
    draw();
  });
}

function bootSequence(){
  const cards = document.querySelectorAll('.agent-card');
  cards.forEach((card,i)=>{
    setTimeout(()=>card.classList.add('booted'), Math.pow(i,0.7)*120);
  });
}

// ─── LIVE STATUS POLLING ─────────────────────────────────
const STATUS_URL = 'https://raw.githubusercontent.com/houstoninvestments-jpg/archiebase-bridge/main/status.json';

async function pollStatus(){
  try {
    const res = await fetch(STATUS_URL + '?t=' + Date.now());
    if(!res.ok) return;
    const data = await res.json();
    if(!data.agents) return;
    const SL = {active:'Active', online:'Online', idle:'Idle', standby:'Standby', error:'Error'};
    Object.entries(data.agents).forEach(([id, info])=>{
      const card = document.querySelector('.agent-card[data-id="'+id+'"]');
      if(!card || !info.status) return;
      const statusEl = card.querySelector('.card-status');
      if(statusEl){
        statusEl.className = 'card-status s-'+info.status;
        statusEl.innerHTML = '<div class="status-dot"></div>'+(SL[info.status]||info.status);
      }
    });
    const diagEl = document.getElementById('diag-updated');
    if(diagEl && data.updated) diagEl.textContent = 'SYNC: '+new Date(data.updated).toLocaleTimeString('en-US',{hour12:false});
  } catch(e){}
}
pollStatus();
setInterval(pollStatus, 60000);
